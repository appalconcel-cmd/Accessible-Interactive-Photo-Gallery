<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accessible Interactive Photo Gallery</title>
<link rel="stylesheet" href="style.css">
</head>

<body onload="initializeGallery()">

<h1>Accessible Interactive Photo Gallery</h1>

<div id="image-display">
Hover over an image below to display here.
</div>

<div class="gallery">

<figure>
<img src="https://media.istockphoto.com/id/513727803/photo/ski-slopes-in-french-mountains.jpg?s=612x612&w=0&k=20&c=l4PnVZXqLkj5sRTzMuayLo9pjUOpgEuDhVS63IDYTLw=" 
alt="Snowy ski slopes in the French Alps mountains under a clear blue sky">
<figcaption>Snowy Mountains</figcaption>
</figure>

<figure>
<img src="https://media.istockphoto.com/id/901134626/photo/sun-shining-in-a-forest.jpg?s=612x612&w=0&k=20&c=Z1GPER9EE6BQK_efVKaSO7WODScQYOMPX3TFFPCZt88=" 
alt="Sunlight shining through tall green trees in a peaceful forest">
<figcaption>Forest</figcaption>
</figure>

<figure>
<img src="https://thumbs.dreamstime.com/b/beautiful-beach-white-sand-blue-sky-turquoise-water-tropical-beach-blue-sky-breathtaking-turquoise-ocean-waves-409286627.jpg" 
alt="Beautiful tropical beach with white sand and turquoise ocean water">
<figcaption>Beach</figcaption>
</figure>

<figure>
<img src="https://www.shutterstock.com/image-photo/night-city-skyline-blue-color-600nw-2633567815.jpg" 
alt="Modern city skyline at night with bright blue lights and tall buildings">
<figcaption>City</figcaption>
</figure>

<figure>
<img src="https://thumbs.dreamstime.com/b/vast-desert-sand-dunes-stretch-to-horizon-under-vibrant-sunset-sky-sun-flare-casting-warm-light-long-shadows-across-410018105.jpg" 
alt="Golden desert sand dunes stretching across the horizon during sunset">
<figcaption>Desert</figcaption>
</figure>

</div>

<script src="javascript.js"></script>

</body>
</html>
